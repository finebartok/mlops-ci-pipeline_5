name: MLOps Pipeline

on:
  push:
    branches: [ "master" ]

jobs:

  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Linter
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  validate:
    runs-on: ubuntu-latest
    needs: linter
    if: |
      github.ref == 'refs/heads/master' && 
      contains(github.event.head_commit.message, '[run-train]')

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure DVC
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user ${{ secrets.DAGSHUB_USERNAME }}
          dvc remote modify origin --local password ${{ secrets.DAGSHUB_TOKEN }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        id: train
        run: python train.py

      - name: Create Error Log on Failure
        if: failure()
        run: |
          echo "Training job failed." > error_logs.txt
          echo "Timestamp: $(date)" >> error_logs.txt
          echo "Branch: ${{ github.ref }}" >> error_logs.txt

      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      - name: Upload model info
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt

      - name: Cleanup
        if: always()
        run: echo "Cleaning up temporary cloud volumes..."


  deploy:
    runs-on: ubuntu-latest
    needs: validate

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
      DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download model info
        uses: actions/download-artifact@v4
        with:
          name: model-info
          path: .

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Build Docker Image
        run: |
          RUN_ID=$(cat model_info.txt)
          docker build --build-arg RUN_ID=$RUN_ID -t my-model:latest .

      - name: Mock Docker Push
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"